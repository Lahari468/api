<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Battle Arena</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        min-height:100vh;
        font-family:'Segoe UI',sans-serif;
        background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
        display:flex;
        flex-direction:column;
        align-items:center;
        padding:30px;
        color:white;
    }

    h1{
        font-size:3rem;
        margin-bottom:20px;
        color:#ffd700;
        text-shadow:0 0 15px #ffd700;
    }

    label{
        font-size:1.2rem;
        margin-bottom:10px;
    }

    input{
        width:220px;
        padding:12px;
        border:none;
        border-radius:10px;
        font-size:16px;
        text-align:center;
        margin-top:10px;
    }

    input:focus{
        outline:none;
        box-shadow:0 0 15px #60a5fa;
    }

    button{
        margin-top:15px;
        padding:12px 30px;
        border:none;
        border-radius:10px;
        background:linear-gradient(135deg,#ef4444,#dc2626);
        color:white;
        font-size:16px;
        font-weight:bold;
        cursor:pointer;
        transition:.3s;
    }

    button:hover{
        transform:scale(1.08);
        box-shadow:0 0 20px rgba(239,68,68,.6);
    }

    .box{
        width:900px;
        max-width:95%;
        margin-top:35px;
        background:rgba(255,255,255,0.08);
        backdrop-filter:blur(15px);
        border-radius:25px;
        padding:30px;
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:30px;
        box-shadow:0 10px 30px rgba(0,0,0,.4);
    }

    .player,
    .computer{
        text-align:center;
    }

    .box h3{
        color:#60a5fa;
        font-size:1.4rem;
        margin-bottom:10px;
    }

    .box h4{
        color:white;
        text-transform:capitalize;
        font-size:1.6rem;
        margin-bottom:10px;
    }

    .box h5{
        color:#cbd5e1;
        font-size:1rem;
    }

    img{
        width:180px;
        height:180px;
        object-fit:contain;
        background:white;
        border-radius:50%;
        padding:10px;
        margin:15px auto;
        display:block;
        transition:.4s;
    }

    img:hover{
        transform:scale(1.15) rotate(10deg);
    }

    #winner{
        grid-column:1/3;
        margin-top:20px;
        padding:18px;
        border-radius:15px;
        text-align:center;
        font-size:1.6rem;
        background:linear-gradient(135deg,#22c55e,#16a34a);
        color:white;
        letter-spacing:1px;
        box-shadow:0 0 20px rgba(34,197,94,.5);
    }

    @media(max-width:768px){

        .box{
            grid-template-columns:1fr;
        }

        #winner{
            grid-column:1;
        }

        h1{
            font-size:2.2rem;
        }

        img{
            width:140px;
            height:140px;
        }
    }
</style>
</head>
<body>
<h1>Pokémon Battle Arena</h1>

<label for="pokinumber">Choose Your Pokémon ID</label>
<input type="number" id="pokinumber" placeholder="1 - 1025">

<button onclick="pokibattle()">Battle</button>

<div class="box">

    <div class="player">
        <h3>Player Pokémon</h3>
        <h4 id="pokemon_name_player"></h4>
        <img src="" id="image1">
        <h5 id="base_exp1"></h5>
    </div>

    <div class="computer">
        <h3>Computer Pokémon</h3>
        <h4 id="comp_pokemon_name"></h4>
        <img src="" id="image2">
        <h5 id="base_exp2"></h5>
    </div>

    <h2 id="winner"></h2>

</div>

<script>

    async function pokibattle() {

        const poknumber = document.getElementById("pokinumber");
        const number = poknumber.value;

        const comp_number =
            Math.floor(Math.random() * 1025) + 1;

        try {

            const response_player =
                await fetch(`https://pokeapi.co/api/v2/pokemon/${number}/`);

            if (!response_player.ok) {
                throw new Error("Unable to fetch details");
            }

            const data = await response_player.json();

            const response_computer =
                await fetch(`https://pokeapi.co/api/v2/pokemon/${comp_number}/`);

            const comp_data =
                await response_computer.json();

            const player_pokemon_exp =
                data.base_experience;

            const computer_pokemon_exp =
                comp_data.base_experience;

            document.getElementById("pokemon_name_player")
                .textContent = data.name;

            document.getElementById("comp_pokemon_name")
                .textContent = comp_data.name;

            document.getElementById("image1")
                .src = data.sprites.front_default;

            document.getElementById("image2")
                .src = comp_data.sprites.front_default;

            document.getElementById("base_exp1")
                .textContent =
                "Base Experience: " + data.base_experience;

            document.getElementById("base_exp2")
                .textContent =
                "Base Experience: " + comp_data.base_experience;

            const winner =
                document.getElementById("winner");

            if (player_pokemon_exp > computer_pokemon_exp) {
                winner.textContent =
                    "Winner : PLAYER";
            }
            else if (computer_pokemon_exp > player_pokemon_exp) {
                winner.textContent =
                    " Winner : COMPUTER";
            }
            else {
                winner.textContent =
                    "It's a Tie!";
            }

        }
        catch(error) {
            console.error(error);
            alert("Unable to fetch Pokémon details.");
        }
    }

</script>
</body>
</html>
